publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.0.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  uuid: ^4.5.1
  intl: ^0.20.1
  google_fonts: ^6.2.1
  flutter_colorpicker: ^1.1.0
  in_app_review: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
